<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>P2P File Sharing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>P2P File Sharing</h1>
  
  <div class="login-section">
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="registerUser()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <div class="actions" style="display:none;">
    <h2>Share Files</h2>
    <button onclick="shareFiles()">Share New File</button>

    <h2>Search Files</h2>
    <input type="text" id="searchFilename" placeholder="Filename" />
    <input type="text" id="searchUser" placeholder="Username" />
    <button onclick="searchFiles()">Search</button>
    <button onclick="clearSearch()">Clear</button>
    <button onclick="refreshFiles()">Refresh Files</button>

    <h2>Available Files</h2>
    <ul id="filesList"></ul>

    <h2>Download Progress</h2>
    <progress id="downloadProgress" value="0" max="100" style="width: 100%;"></progress>
    <span id="downloadStatus">No downloads in progress.</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
